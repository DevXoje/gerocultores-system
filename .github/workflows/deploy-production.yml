name: Deploy to Firebase Hosting — Production (Live Channel)

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check, Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx vue-tsc --noEmit

      - name: Unit tests
        run: npm test

  firestore-rules:
    name: Firestore Security Rules (Emulator)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/tests/firestore-rules/package-lock.json

      - name: Setup Java 21 (required by Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # No cache — firebase emulators downloaded fresh each run.

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install test dependencies
        run: npm --prefix code/tests/firestore-rules install

      - name: Run Firestore rules tests
        working-directory: code
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-test \
            "cd tests/firestore-rules && npm test"

  deploy-api:
    name: Build & Deploy API to Production Cloud Function
    needs: [ci, firestore-rules]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/api/package-lock.json

      - name: Install API dependencies
        working-directory: code/api
        run: npm ci

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Build API (TypeScript → dist/)
        working-directory: code/api
        run: npm run build

      - name: Deploy Cloud Function — production
        working-directory: code
        env:
          GOOGLE_APPLICATION_CREDENTIALS_CONTENT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GERO_CARE }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_CONTENT" > /tmp/firebase-deployer-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-deployer-sa.json
          npx firebase deploy --only functions --non-interactive --project gero-care

  deploy-production:
    name: Build & Deploy Frontend to Production
    needs: [deploy-api]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        working-directory: code/frontend
        run: npm ci

      - name: Build frontend
        working-directory: code/frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PRODUCTION }}
        run: npm run build

      - name: Deploy to Firebase Hosting — live channel (production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GERO_CARE }}
          projectId: gero-care
          channelId: live
          entryPoint: ./code
