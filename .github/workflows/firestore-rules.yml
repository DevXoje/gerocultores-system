name: Firestore Rules Tests

on:
  pull_request:
    branches:
      - develop
      - master
    paths:
      - 'code/firestore.rules'
      - 'code/tests/firestore-rules/**'
  push:
    branches:
      - develop
      - master
    paths:
      - 'code/firestore.rules'
      - 'code/tests/firestore-rules/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firestore-rules:
    name: Firestore Security Rules (Emulator)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: code/tests/firestore-rules/package-lock.json

      - name: Setup Java 21 (required by Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # No cache — firebase emulators are downloaded fresh each run.
      # The binary is ~130MB and cache invalidation issues have caused
      # stale emulator versions to persist in CI causing null-value rule errors.

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install test dependencies
        run: npm --prefix code/tests/firestore-rules install

      - name: Run Firestore rules tests via emulators:exec
        working-directory: code
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-test \
            "cd tests/firestore-rules && npm test"
