name: Production — Deploy Live

on:
  push:
    branches:
      - master

jobs:
  lint-typecheck-test:
    name: Lint, Type-check, Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx vue-tsc --noEmit

      - name: Unit tests
        run: npm test

  firestore-rules:
    name: Firestore Rules
    uses: ./.github/workflows/_reusable-firestore-rules.yml

  deploy-production:
    name: Build & Deploy to Production
    needs: [lint-typecheck-test, firestore-rules]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        working-directory: code/frontend
        run: npm ci

      - name: Build frontend
        working-directory: code/frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy to Firebase Hosting — live channel (production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GERO_CARE }}
          projectId: gero-care
          channelId: live
          entryPoint: ./code
