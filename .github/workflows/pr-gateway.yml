name: PR Gateway (Monorepo CI)

on:
  pull_request:
    branches:
      - develop
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. ENRUTADOR: Detecta qué partes del monorepo han cambiado
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      firestore: ${{ steps.filter.outputs.firestore }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'code/frontend/**'
              - '.github/workflows/pr-gateway.yml'
            firestore:
              - 'code/firestore.rules'
              - 'code/tests/firestore-rules/**'
              - '.github/workflows/pr-gateway.yml'

  # 2a. FRONTEND CI
  frontend-ci:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    name: Frontend CI & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint & Format check
        run: |
          npm run lint
          npm run format:check

      - name: Type-check
        run: |
          npx vue-tsc --noEmit
          npx vue-tsc --noEmit -p tsconfig.vitest.json

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: code/frontend/playwright-report/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: code/frontend/dist/

  # 2b. FRONTEND PREVIEW (Solo si Frontend CI pasó)
  frontend-preview:
    needs: frontend-ci
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    name: Deploy Frontend Preview
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: code/frontend/dist/

      - name: Deploy to Firebase Hosting — PR preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GERO_CARE }}
          projectId: gero-care
          entryPoint: code

  # 3. FIRESTORE CI
  firestore-ci:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.firestore == 'true' }}
    name: Firestore Security Rules (Emulator)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/tests/firestore-rules/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Firebase Emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v2

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install test dependencies
        run: npm --prefix code/tests/firestore-rules install

      - name: Run Firestore rules tests via emulators:exec
        working-directory: code
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-test \
            "cd tests/firestore-rules && npm test"

  # 4. AGREGADOR (El único Check que exige el Ruleset)
  ci-gateway:
    name: CI Gateway Success
    needs: [detect-changes, frontend-ci, firestore-ci]
    if: always() # Obligatorio para recolectar el estado final sin saltarse
    runs-on: ubuntu-latest
    steps:
      - name: Verify Results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Uno o más sub-pipelines fallaron o fueron cancelados."
            exit 1
          else
            echo "Todos los pipelines relevantes han pasado correctamente."
          fi
